name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install verified build backend
        run: python -m pip install "setuptools==82.0.1"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Bytecode compile
        run: python -m compileall -q src tests examples
      - name: Editable install without dependencies
        run: python -m pip install --no-deps --no-build-isolation -e .
      - name: Console entry point smoke test
        run: trajectory-lab --help
