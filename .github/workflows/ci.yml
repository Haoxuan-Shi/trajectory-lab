name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Bytecode compile
        run: python -m compileall -q src tests examples
      - name: Editable install without dependencies
        run: python -m pip install --no-deps --no-build-isolation -e .
      - name: Console entry point smoke test
        run: trajectory-lab --help
